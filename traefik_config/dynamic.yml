http:
  routers:
    dashboard:
      rule: Host(`traefik.localhost`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      service: api@internal
      entryPoints:
        - websecure
      tls: {}

tls:
  certificates:
    - certFile: /etc/traefik/certs/_wildcard.localhost+1.pem
      keyFile: /etc/traefik/certs/_wildcard.localhost+1-key.pem
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/_wildcard.localhost+1.pem
        keyFile: /etc/traefik/certs/_wildcard.localhost+1-key.pem