name: workflow.yml
on:
  push:
    branches: [ main ]

  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install asset-common package
        run: pip install -e ./common

      - name: Install asset-service package
        run: pip install -e ./service/asset-service

      - name: Run tests
        run: pytest services/asset-service/tests -q
